name: CI

on:
  push:
    branches: [main, dev, stable]
  pull_request:
    branches: ['**']
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  nix-tests:
    name: Testing on Python ${{matrix.python-version}}
    runs-on: [self-hosted, nixos]
    strategy:
      matrix:
        #python-version: ["3.10","3.11","3.12","3.13"]
        python-version: ["3.12","3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Setup dev env
        # setup-dev-env clones the siblings listed in .github/sibling-repos
        # (codetracer-trace-format, codetracer-trace-format-nim) at the
        # workspace-lock-pinned revisions before materialising the nix env.
        uses: metacraft-labs/metacraft-github-actions/setup-dev-env@main
        with:
          env-flavor: nix
          gh-token: ${{ steps.app-token.outputs.token }}

      - name: Prepare dev environment
        run: dev-exec just venv ${{matrix.python-version}} dev

      - name: Build ct-print binary
        # tests/python/test_cli_integration.py shells out to
        # ../codetracer-trace-format-nim/ct-print to decode CTFS
        # trace bundles back into the legacy JSON shape used by the
        # pure-python recorder reference oracle.  Compile it from
        # codetracer_ct_print.nim into the expected path.
        run: |
          dev-exec bash -c '
            cd "${GITHUB_WORKSPACE}/../codetracer-trace-format-nim"
            nim c -d:release -p:src -o:ct-print src/codetracer_ct_print.nim
          '

      - name: Verify recorder version metadata
        run: dev-exec python3 scripts/check_recorder_version.py

      - name: Rust tests
        run: dev-exec just cargo-test

      - name: Python tests
        run: dev-exec just py-test

  coverage:
    name: Coverage (Python 3.12)
    needs: nix-tests
    runs-on: [self-hosted, nixos]
    continue-on-error: true
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Setup dev env
        # setup-dev-env clones the siblings listed in .github/sibling-repos
        # (codetracer-trace-format, codetracer-trace-format-nim) at the
        # workspace-lock-pinned revisions before materialising the nix env.
        uses: metacraft-labs/metacraft-github-actions/setup-dev-env@main
        with:
          env-flavor: nix
          gh-token: ${{ steps.app-token.outputs.token }}

      - name: Prepare dev environment (Python 3.12)
        run: dev-exec just venv 3.12 dev

      - name: Collect coverage
        id: coverage-run
        run: dev-exec just coverage

      - name: Generate coverage comment
        if: steps.coverage-run.outcome == 'success'
        run: |
          ROOT="$(pwd)"
          dev-exec bash -c "python3 codetracer-python-recorder/scripts/generate_coverage_comment.py \
            --rust-summary codetracer-python-recorder/target/coverage/rust/summary.json \
            --python-json codetracer-python-recorder/target/coverage/python/coverage.json \
            --output codetracer-python-recorder/target/coverage/coverage-comment.md \
            --repo-root \"${ROOT}\""

      - name: Upload Rust coverage artefacts
        if: steps.coverage-run.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: |
            codetracer-python-recorder/target/coverage/rust/lcov.info
            codetracer-python-recorder/target/coverage/rust/summary.json
          if-no-files-found: warn

      - name: Upload Python coverage artefacts
        if: steps.coverage-run.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: |
            codetracer-python-recorder/target/coverage/python/coverage.xml
            codetracer-python-recorder/target/coverage/python/coverage.json
          if-no-files-found: warn

      - name: Upload coverage comment
        if: steps.coverage-run.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-comment
          path: codetracer-python-recorder/target/coverage/coverage-comment.md
          if-no-files-found: warn

      - name: Comment coverage summary
        if: github.event_name == 'pull_request' && steps.coverage-run.outcome == 'success'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          identifier: coverage-summary
          body-path: codetracer-python-recorder/target/coverage/coverage-comment.md

  nix-build:
    name: Verify nix flake packages build
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@v4

      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Setup dev env
        uses: metacraft-labs/metacraft-github-actions/setup-dev-env@main
        with:
          env-flavor: nix
          gh-token: ${{ steps.app-token.outputs.token }}

      # NOTE: .#default (rust-backed recorder) is skipped because
      # importCargoLock cannot resolve Cargo path dependencies that
      # reference the external codetracer-trace-format repo.
      # The nix-tests job already verifies the Rust build via maturin.

      - name: Build pure-python recorder
        run: nix build .#codetracer-pure-python-recorder
