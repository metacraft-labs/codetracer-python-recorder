name: launcher-integration

# Single-edge cross-repo CI: when codetracer-python-recorder changes,
# verify the launcher's bundled-package build still works against this
# recorder's source. Mirrors the pattern in
# codetracer-specs/Testing/Cross-Repo-CI-Integration.md.
#
# Uses the org-wide metacraft-labs-ci-token-provider GitHub App
# (CI_TOKEN_PROVIDER_APP_ID + CI_TOKEN_PROVIDER_PRIVATE_KEY) to mint
# a short-lived token for cloning the (private during pre-launch)
# codetracer-launcher repo. Both secrets are org-level with ALL-repo
# access, so this workflow needs no per-repo bootstrap.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pypi-bundling:
    runs-on: ubuntu-latest
    name: pypi bundling smoke-test
    steps:
      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - uses: actions/checkout@v4
        with:
          path: codetracer-python-recorder

      - uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer-launcher
          ref: main
          path: codetracer-launcher
          gh-token: ${{ steps.app-token.outputs.token }}

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.4"

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build launcher
        working-directory: codetracer-launcher
        run: bash ./build.sh --target linux-musl-x86_64 --out launcher

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          # setuptools + wheel are required because the pypi wheel build
          # runs with `--no-isolation`; Python 3.12 ships no setuptools
          # by default, so the build backend must be installed
          # explicitly. Without these, the build fails with
          # "BackendUnavailable: Cannot import 'setuptools.build_meta'".
          python -m pip install build virtualenv setuptools wheel

      - name: Build bundled wheel
        working-directory: codetracer-launcher/packaging/pypi
        env:
          CT_LAUNCHER_VERSION: 0.1.0
          CT_LAUNCHER_BIN: ${{ github.workspace }}/codetracer-launcher/out/launcher
          CT_LAUNCHER_TARGET: linux-musl-x86_64
          # The recorder's Python package source — this is what gets
          # vendored under codetracer/recorder/ in the wheel.
          CT_RECORDER_SRC: ${{ github.workspace }}/codetracer-python-recorder/codetracer-python-recorder/codetracer_python_recorder
        run: python -m build --wheel --no-isolation -o dist

      - name: Smoke-test the wheel
        run: |
          python -m venv /tmp/m9-venv
          /tmp/m9-venv/bin/pip install codetracer-launcher/packaging/pypi/dist/*.whl
          out=$(/tmp/m9-venv/bin/ct --version)
          echo "$out"
          echo "$out" | grep -qE "^ct [0-9]+\.[0-9]+"
