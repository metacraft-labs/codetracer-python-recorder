name: CI (windows-diy)

# Replays the project's Windows DIY dev env (env.ps1 + scoop/winget
# managed toolchain) through the shared `setup-dev-env` composite
# action's `windows-diy` flavor.  Runs alongside `ci.yml` (Linux
# `nix`) and `ci-reprobuild.yml` (multi-OS reprobuild) so all three
# dev-env paths gate merges — see
# `metacraft-dev-guidelines/policies/ci-shared-dev-env.md` §4
# (Migration story) for the rollout shape.
#
# The Windows DIY path is the developer-facing contract on Windows
# (`. .\env.ps1; just test`), so this workflow exists to catch
# Windows-only regressions that the Linux `nix` job can't surface
# and that the reprobuild path could silently hide under its own
# tool-provisioning code.

on:
  push:
    branches: [main, dev, stable]
  pull_request:
    branches: [main, dev, stable]

jobs:
  windows-diy:
    name: Windows DIY — just build/test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Sibling repos the recorder depends on — same set as the
      # `ci-reprobuild.yml` job so the two paths see an identical
      # workspace shape.
      - name: Clone codetracer-trace-format sibling
        shell: bash
        run: |
          PINS=".github/sibling-pins"
          TF_REF="main"
          if [ -f "${PINS}" ]; then
            PIN="$(grep '^codetracer-trace-format ' "${PINS}" | cut -d' ' -f2)" || true
            [ -n "${PIN}" ] && TF_REF="${PIN}"
          fi
          rm -rf "${GITHUB_WORKSPACE}/../codetracer-trace-format"
          if ! git clone --depth 1 --branch "${TF_REF}" --single-branch \
            "https://github.com/metacraft-labs/codetracer-trace-format.git" \
            "${GITHUB_WORKSPACE}/../codetracer-trace-format" 2>/dev/null; then
            rm -rf "${GITHUB_WORKSPACE}/../codetracer-trace-format"
            git clone --no-checkout "https://github.com/metacraft-labs/codetracer-trace-format.git" \
              "${GITHUB_WORKSPACE}/../codetracer-trace-format"
            git -C "${GITHUB_WORKSPACE}/../codetracer-trace-format" checkout "${TF_REF}"
          fi

      - name: Clone codetracer-trace-format-nim sibling
        shell: bash
        run: |
          rm -rf "${GITHUB_WORKSPACE}/../codetracer-trace-format-nim"
          git clone --depth 1 \
            "https://github.com/metacraft-labs/codetracer-trace-format-nim.git" \
            "${GITHUB_WORKSPACE}/../codetracer-trace-format-nim"

      - name: Setup dev env (windows-diy flavor)
        uses: metacraft-labs/metacraft-github-actions/setup-dev-env@main
        with:
          env-flavor: windows-diy

      - name: just build
        run: dev-exec just build

      - name: just test
        run: dev-exec just test

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-diy-logs
          path: |
            target/
            test-logs/
          retention-days: 7
          if-no-files-found: ignore
